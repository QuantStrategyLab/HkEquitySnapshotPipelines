name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]' ruff build
      - name: Verify dependencies
        run: |
          set -euo pipefail
          python -m pip check
      - name: Run Ruff
        run: |
          set -euo pipefail
          ruff check .
      - name: Run tests
        run: |
          set -euo pipefail
          python -m pytest -q
      - name: Build package
        run: |
          set -euo pipefail
          python -m build

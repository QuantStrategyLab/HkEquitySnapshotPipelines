[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hk-equity-snapshot-pipelines"
version = "0.1.1"
description = "Feature-snapshot pipelines and scaffold helpers for Hong Kong equity strategies"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pandas>=2.0",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[project.scripts]
hkeq-build-blue-chip-leader-snapshot = "hk_equity_snapshot_pipelines.blue_chip_leader_rotation:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 120
